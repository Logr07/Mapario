services:
  db:
    build:
      context: ./database
      dockerfile: Dockerfile
    image: mapa-bakalarka-postgis:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-interest_map}
      POSTGRES_USER: ${POSTGRES_USER:-interest_map}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://interest_map:change-me@db:5432/interest_map}
      FLASK_ENV: production
      FLASK_DEBUG: "0"
      UPLOAD_FOLDER: ${UPLOAD_FOLDER:-/app/uploads}
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
